<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Player Details - Arcade Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1a1a2e; color: #e0e0e0; }
        .navbar { background: linear-gradient(135deg, #16213e, #0f3460) !important; }
        .table { color: #e0e0e0; } .table-dark { background-color: #16213e; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: rgba(15,52,96,0.5); color: #e0e0e0; }
        .table-striped > tbody > tr:nth-of-type(even) { background-color: rgba(22,33,62,0.5); color: #e0e0e0; }
        .btn-arcade { background: linear-gradient(135deg, #e94560, #533483); border: none; color: white; }
        .btn-arcade:hover { background: linear-gradient(135deg, #533483, #e94560); color: white; }
        h1, h2 { color: #e94560; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control, .form-select { background-color: #16213e; border-color: #0f3460; color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background-color: #16213e; color: #e0e0e0; border-color: #e94560; }
        label { color: #a0a0c0; }
        .alert-success { background-color: #1b4332; border-color: #2d6a4f; color: #95d5b2; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">&#127918; Arcade Management</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/games">Games</a>
                <a class="nav-link" href="/achievements">Achievements</a>
                <a class="nav-link" href="/items">Items</a>
                <a class="nav-link" href="/sessions">Sessions</a>
                <a class="nav-link" href="/players/leaderboard">Leaderboard</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5"><div class="row"><div class="col-md-12"><div class="card p-4 mb-4">
        <h2 class="text-center mb-4">&#128100; Player Profile: <span th:text="${player.username}"></span></h2>
        <div class="row">
            <div class="col-md-6">
                <table class="table table-borderless">
                    <tr><td style="color:#a0a0c0;font-weight:bold">Rank:</td><td><span th:text="${player.rank != null ? player.rank.badge : ''}"></span> <span th:text="${player.rank != null ? player.rank.rankName : 'N/A'}"></span></td></tr>
                    <tr><td style="color:#a0a0c0;font-weight:bold">Total Score:</td><td th:text="${player.totalScore}"></td></tr>
                    <tr><td style="color:#a0a0c0;font-weight:bold">Wins:</td><td th:text="${player.wins}"></td></tr>
                    <tr><td style="color:#a0a0c0;font-weight:bold">Losses:</td><td th:text="${player.losses}"></td></tr>
                    <tr><td style="color:#a0a0c0;font-weight:bold">Games Played:</td><td th:text="${player.gamesPlayed}"></td></tr>
                    <tr><td style="color:#a0a0c0;font-weight:bold">Registered:</td><td th:text="${player.registrationDate}"></td></tr>
                </table>
            </div>
            <div class="col-md-6">
                <h4 style="color:#e94560;">&#127942; Achievements</h4>
                <div th:if="${player.achievements != null and !player.achievements.isEmpty()}" class="mb-3">
                    <th:block th:each="pa : ${player.achievements}">
                        <span class="badge bg-success me-1" th:text="${pa.achievement != null ? pa.achievement.name : ''}"></span>
                    </th:block>
                </div>
                <p th:if="${player.achievements == null or player.achievements.isEmpty()}" class="text-muted">No achievements yet</p>
                
                <h4 class="mt-4" style="color:#e94560;">&#128230; Inventory</h4>
                <div th:if="${player.items != null and !player.items.isEmpty()}">
                    <th:block th:each="pi : ${player.items}">
                        <div class="d-flex justify-content-between border-bottom border-secondary py-2">
                            <span th:text="${pi.item != null ? pi.item.itemName : ''}"></span>
                            <span class="badge bg-warning text-dark" th:text="${pi.item != null ? pi.item.rarity : ''}"></span>
                        </div>
                    </th:block>
                </div>
                <p th:if="${player.items == null or player.items.isEmpty()}" class="text-muted">No items yet</p>
                <a th:href="@{/players/{id}/items(id=${player.playerID})}" class="btn btn-sm btn-arcade mt-2">Add Item</a>
            </div>
        </div>
        <h4 class="mt-4" style="color:#e94560;">&#127918; Session History</h4>
        <table class="table table-dark table-sm" th:if="${player.sessions != null and !player.sessions.isEmpty()}">
            <thead><tr><th>Game</th><th>Score</th><th>Result</th></tr></thead>
            <tbody>
                <tr th:each="ps : ${player.sessions}">
                    <td th:text="${ps.session != null and ps.session.game != null ? ps.session.game.title : 'N/A'}"></td>
                    <td th:text="${ps.score}"></td>
                    <td th:text="${ps.score >= 1500 ? 'WIN' : 'LOSS'}"></td>
                </tr>
            </tbody>
        </table>
        <p th:if="${player.sessions == null or player.sessions.isEmpty()}" class="text-muted">No sessions yet</p>
        <a href="/players" class="btn btn-arcade mt-3">Back to Players</a>
    </div></div></div></div></body></html>
