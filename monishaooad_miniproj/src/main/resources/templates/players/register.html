<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Player - Arcade Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1a1a2e; color: #e0e0e0; }
        .navbar { background: linear-gradient(135deg, #16213e, #0f3460) !important; }
        .table { color: #e0e0e0; } .table-dark { background-color: #16213e; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: rgba(15,52,96,0.5); color: #e0e0e0; }
        .table-striped > tbody > tr:nth-of-type(even) { background-color: rgba(22,33,62,0.5); color: #e0e0e0; }
        .btn-arcade { background: linear-gradient(135deg, #e94560, #533483); border: none; color: white; }
        .btn-arcade:hover { background: linear-gradient(135deg, #533483, #e94560); color: white; }
        h1, h2 { color: #e94560; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control, .form-select { background-color: #16213e; border-color: #0f3460; color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background-color: #16213e; color: #e0e0e0; border-color: #e94560; }
        label { color: #a0a0c0; }
        .alert-success { background-color: #1b4332; border-color: #2d6a4f; color: #95d5b2; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">&#127918; Arcade Management</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/games">Games</a>
                <a class="nav-link" href="/achievements">Achievements</a>
                <a class="nav-link" href="/items">Items</a>
                <a class="nav-link" href="/sessions">Sessions</a>
                <a class="nav-link" href="/players/leaderboard">Leaderboard</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5"><div class="row justify-content-center"><div class="col-md-6"><div class="card p-4">
        <h2 class="text-center mb-4">Player Registration</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/players/register}" th:object="${playerDTO}" method="post">
            <div class="mb-3"><label class="form-label">Username:</label><input type="text" th:field="*{username}" class="form-control" placeholder="Enter username"/>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></span></div>
            <div class="mb-3"><label class="form-label">Email:</label><input type="email" th:field="*{email}" class="form-control" placeholder="Enter email"/>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span></div>
            <div class="mb-3"><label class="form-label">Password:</label><input type="password" th:field="*{password}" class="form-control" placeholder="Enter password"/>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span></div>
            <div class="mb-3"><label class="form-label">Avatar URL (optional):</label><input type="text" th:field="*{avatar}" class="form-control"/></div>
            <button type="submit" class="btn btn-arcade w-100">Register</button>
        </form>
        <a href="/players" class="btn btn-secondary w-100 mt-2">Back to Players</a>
    </div></div></div></div></body></html>
