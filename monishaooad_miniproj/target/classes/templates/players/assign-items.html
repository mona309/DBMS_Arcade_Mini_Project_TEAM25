<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assign Item - Arcade Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1a1a2e; color: #e0e0e0; }
        .navbar { background: linear-gradient(135deg, #16213e, #0f3460) !important; }
        .btn-arcade { background: linear-gradient(135deg, #e94560, #533483); border: none; color: white; }
        h1, h2 { color: #e94560; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control, .form-select { background-color: #16213e; border-color: #0f3460; color: #e0e0e0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">&#127918; Arcade Management</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/players">Players</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4">&#128230; Add Item to <span th:text="${player.username}"></span></h2>
                    <form th:action="@{/players/{id}/items(id=${player.playerID})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Select Item</label>
                            <select name="itemId" class="form-select" required>
                                <option value="">Select item</option>
                                <option th:each="i : ${items}" 
                                        th:value="${i.itemID}" 
                                        th:text="${i.itemName + ' (' + i.rarity + ') [+'+ i.bonusScore +' pts]'}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-arcade w-100">Add Item</button>
                    </form>
                    <a th:href="@{/players/{id}(id=${player.playerID})}" class="btn btn-secondary w-100 mt-3">Back to Profile</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
