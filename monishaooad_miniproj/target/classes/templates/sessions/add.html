<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Start Session - Arcade Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1a1a2e; color: #e0e0e0; }
        .navbar { background: linear-gradient(135deg, #16213e, #0f3460) !important; }
        .table { color: #e0e0e0; } .table-dark { background-color: #16213e; }
        .btn-arcade { background: linear-gradient(135deg, #e94560, #533483); border: none; color: white; }
        .btn-arcade:hover { background: linear-gradient(135deg, #533483, #e94560); color: white; }
        h1, h2 { color: #e94560; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control, .form-select { background-color: #16213e; border-color: #0f3460; color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background-color: #16213e; color: #e0e0e0; border-color: #e94560; }
        label { color: #a0a0c0; }
        .alert-info { background-color: #1f4e79; border-color: #3a6ea5; color: #bdd7ee; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">&#127918; Arcade Management</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/games">Games</a>
                <a class="nav-link" href="/achievements">Achievements</a>
                <a class="nav-link" href="/items">Items</a>
                <a class="nav-link" href="/sessions">Sessions</a>
                <a class="nav-link" href="/players/leaderboard">Leaderboard</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4">Start New Session</h2>
                    <div th:if="${games == null or games.isEmpty()}" class="alert alert-info">
                        No games available. <a href="/games/add" class="text-decoration-underline">Add a game first</a> to create sessions.
                    </div>
                    <form th:action="@{/sessions/add}" method="post" th:if="${games != null and !games.isEmpty()}">
                        <div class="mb-3">
                            <label class="form-label">Game</label>
                            <select name="gameId" class="form-select" required>
                                <option value="" disabled selected>Select game</option>
                                <option th:each="game : ${games}" th:value="${game.gameID}" th:text="${game.title}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Start Time (optional)</label>
                            <input type="datetime-local" name="startTime" class="form-control" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">End Time (optional)</label>
                            <input type="datetime-local" name="endTime" class="form-control" />
                        </div>
                        <button type="submit" class="btn btn-arcade w-100">Create Session</button>
                    </form>
                    <a href="/sessions" class="btn btn-secondary w-100 mt-3">Back to sessions</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
