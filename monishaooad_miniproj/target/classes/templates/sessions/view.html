<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Session Details - Arcade Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1a1a2e; color: #e0e0e0; }
        .navbar { background: linear-gradient(135deg, #16213e, #0f3460) !important; }
        .table { color: #e0e0e0; } .table-dark { background-color: #16213e; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: rgba(15,52,96,0.5); color: #e0e0e0; }
        .table-striped > tbody > tr:nth-of-type(even) { background-color: rgba(22,33,62,0.5); color: #e0e0e0; }
        .btn-arcade { background: linear-gradient(135deg, #e94560, #533483); border: none; color: white; }
        .btn-arcade:hover { background: linear-gradient(135deg, #533483, #e94560); color: white; }
        h1, h2 { color: #e94560; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control, .form-select { background-color: #16213e; border-color: #0f3460; color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background-color: #16213e; color: #e0e0e0; border-color: #e94560; }
        label { color: #a0a0c0; }
        .alert-success { background-color: #1b4332; border-color: #2d6a4f; color: #95d5b2; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">&#127918; Arcade Management</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/games">Games</a>
                <a class="nav-link" href="/achievements">Achievements</a>
                <a class="nav-link" href="/items">Items</a>
                <a class="nav-link" href="/sessions">Sessions</a>
                <a class="nav-link" href="/players/leaderboard">Leaderboard</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5"><div class="row justify-content-center"><div class="col-md-8"><div class="card p-4">
        <h2 class="text-center mb-4">&#127922; Session Details</h2>
        <table class="table table-borderless">
            <tr><td style="color:#a0a0c0;font-weight:bold">Session ID:</td><td><span th:text="${session?.sessionID}">0</span></td></tr>
            <tr><td style="color:#a0a0c0;font-weight:bold">Game:</td><td th:text="${session.game != null ? session.game.title : 'N/A'}"></td></tr>
            <tr><td style="color:#a0a0c0;font-weight:bold">Start Time:</td><td th:text="${session.startTime}"></td></tr>
            <tr><td style="color:#a0a0c0;font-weight:bold">End Time:</td><td th:text="${session.endTime}"></td></tr>
        </table>
        <h4 class="mt-4" style="color:#e94560;">Player Sessions</h4>
        <table class="table table-dark table-sm" th:if="${session.playerSessions != null and !session.playerSessions.isEmpty()}">
            <thead><tr><th>Player</th><th>Score</th><th>Position</th></tr></thead>
            <tbody><tr th:each="ps : ${session.playerSessions}">
                <td th:text="${ps.player != null ? ps.player.username : 'N/A'}"></td><td th:text="${ps.score}"></td><td th:text="${ps.position}"></td>
            </tr></tbody>
        </table>
        <p th:if="${session.playerSessions == null or session.playerSessions.isEmpty()}" class="text-muted">No players in this session.</p>
        <div class="mt-4" th:if="${session != null}">
        <th:block th:if="${session.endTime != null and session.endTime.isAfter(#temporals.createNow())}">
            <h4 style="color:#e94560;">Join Session</h4>
            <form method="post" th:action="@{/sessions/{id}/join(id=${session.sessionID})}">
                <div class="mb-3">
                    <label class="form-label">Add Player</label>
                    <select name="playerId" class="form-select" required>
                        <option value="">Select player</option>
                        <th:block th:each="p : ${players}">
                            <option th:if="${p.playerID != null}" th:value="${p.playerID}" th:text="${p.username}"></option>
                        </th:block>
                    </select>
                </div>
                <button type="submit" class="btn btn-arcade">Join</button>
            </form>
        </th:block>
        </div>
        <div class="mt-4" th:if="${session != null and session.playerSessions != null and not session.playerSessions.isEmpty()}">
        <th:block th:if="${session.endTime != null and session.endTime.isAfter(#temporals.createNow())}">
            <form method="post" th:action="@{/sessions/{id}/end(id=${session.sessionID})}">
                <label class="form-label">Select Winner</label>
                <select name="winnerId" class="form-select mb-3" required>
                    <option value="">Select winner</option>
                    <th:block th:each="ps : ${session.playerSessions}">
                        <option th:if="${ps.player != null}" th:value="${ps.player.playerID}" th:text="${ps.player.username}"></option>
                    </th:block>
                </select>
                <button type="submit" class="btn btn-success">End Session</button>
            </form>
        </th:block>
        </div>
        <div class="mt-3">
            <a href="/sessions" class="btn btn-secondary">Back to Sessions</a>
        </div>
    </div></div></div></div></body></html>
